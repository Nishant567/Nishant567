<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="50%"  stop-color="#050d2a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#020818"/>
      <stop offset="20%"  stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="80%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#020818"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <path d="M0,20 Q225,0 450,15 Q675,30 900,15 L900,0 L0,0 Z" fill="#0d1117"/>
  <rect y="20" width="900" height="80" fill="url(#footerBg)"/>

  <!-- Animated glowing top line -->
  <rect x="0" y="22" width="900" height="1.5" fill="url(#lineGrad)" filter="url(#glow2)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Travelling dot on line -->
  <circle cy="22.75" r="4" fill="#38bdf8" filter="url(#glow2)">
    <animate attributeName="cx" values="-10;910" dur="4s" repeatCount="indefinite" calcMode="ease-in-out"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="22.75" r="4" fill="#a78bfa" filter="url(#glow2)">
    <animate attributeName="cx" values="-10;910" dur="4s" begin="2s" repeatCount="indefinite" calcMode="ease-in-out"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Footer text -->
  <text x="450" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#475569" letter-spacing="3">
    LET'S BUILD SOMETHING GREAT TOGETHER
  </text>
  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#334155" letter-spacing="1">
    nishantupadhya567@gmail.com  ·  linkedin.com/in/nishantupadhyay25
  </text>
</svg>
